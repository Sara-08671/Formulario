<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #080a0f;
            --surface: #0e1118;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #c8ff00;
            --accent2: #00e5ff;
            --text: #f0f0f0;
            --muted: #6b7280;
            --error: #ff4d6d;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200, 255, 0, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 20%, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo / brand */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            flex-shrink: 0;
        }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--text);
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Fields */
        .field {
            margin-bottom: 18px;
            animation: fadeIn 0.5s ease both;
        }

        .field:nth-child(1) {
            animation-delay: 0.1s
        }

        .field:nth-child(2) {
            animation-delay: 0.15s
        }

        .field:nth-child(3) {
            animation-delay: 0.2s
        }

        .field:nth-child(4) {
            animation-delay: 0.25s
        }

        .field:nth-child(5) {
            animation-delay: 0.3s
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        select option {
            background: #111318;
            color: var(--text);
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200, 255, 0, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }

        input::placeholder {
            color: #3a3f4a;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Password toggle */
        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            padding-right: 42px;
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .toggle-pass:hover {
            color: var(--accent);
        }

        /* Terms */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .terms input[type="checkbox"] {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 1px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .terms a {
            color: var(--accent);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #080a0f;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(200, 255, 0, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1d25;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            border-color: var(--accent);
            color: var(--accent);
        }

        #toast.error {
            border-color: var(--error);
            color: var(--error);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .login-link a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #080a0f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <div class="wrapper">
        <div class="brand">
            <div class="brand-icon"></div>
            <span class="brand-name">Antigravity</span>
        </div>

        <div class="card">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Únete a la comunidad. Sin límites, sin gravedad.</p>

            <div id="registerForm">
                <div class="row-2">
                    <div class="field">
                        <label>Nombre</label>
                        <input type="text" id="firstName" placeholder="Diego" autocomplete="given-name" />
                    </div>
                    <div class="field">
                        <label>Apellido</label>
                        <input type="text" id="lastName" placeholder="Torres" autocomplete="family-name" />
                    </div>
                </div>

                <div class="field">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" placeholder="diego@antigravity.co" autocomplete="email" />
                </div>

                <div class="field">
                    <label>Teléfono</label>
                    <input type="tel" id="phone" placeholder="+57 300 000 0000" autocomplete="tel" />
                </div>

                <div class="field">
                    <label>Nivel</label>
                    <select id="level">
                        <option value="">Selecciona tu nivel</option>
                        <option value="beginner">Principiante</option>
                        <option value="intermediate">Intermedio</option>
                        <option value="advanced">Avanzado</option>
                        <option value="pro">Pro / Competidor</option>
                    </select>
                </div>

                <div class="field">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres"
                            autocomplete="new-password" />
                        <button class="toggle-pass" type="button" onclick="togglePassword()" id="toggleBtn">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="terms" />
                    <span>Acepto los <a href="#">Términos de Servicio</a> y la <a href="#">Política de Privacidad</a> de
                        Antigravity.</span>
                </div>

                <button class="btn" id="submitBtn" onclick="handleSubmit()">
                    <div class="btn-inner">
                        <div class="spinner" id="spinner"></div>
                        <span id="btnText">Registrarse</span>
                    </div>
                </button>
            </div>

            <p class="login-link">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ──────────────────────────────────────────────
        // 🔧 CONFIGURACIÓN SUPABASE
        // Reemplaza con tus credenciales reales de Supabase
        // ──────────────────────────────────────────────
        const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY = 'TU_ANON_PUBLIC_KEY';

        // ──────────────────────────────────────────────

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            setTimeout(() => { t.className = ''; }, 3500);
        }

        function setLoading(on) {
            document.getElementById('submitBtn').disabled = on;
            document.getElementById('spinner').style.display = on ? 'block' : 'none';
            document.getElementById('btnText').textContent = on ? 'Registrando...' : 'Registrarse';
        }

        async function handleSubmit() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const level = document.getElementById('level').value;
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;

            // Validaciones básicas
            if (!firstName || !lastName || !email || !password) {
                return showToast('⚠️ Completa todos los campos obligatorios', 'error');
            }
            if (!/\S+@\S+\.\S+/.test(email)) {
                return showToast('⚠️ Correo inválido', 'error');
            }
            if (password.length < 8) {
                return showToast('⚠️ La contraseña debe tener al menos 8 caracteres', 'error');
            }
            if (!terms) {
                return showToast('⚠️ Acepta los términos para continuar', 'error');
            }

            setLoading(true);

            try {
                // 1. Crear usuario en Supabase Auth
                const authRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY
                    },
                    body: JSON.stringify({ email, password })
                });

                const authData = await authRes.json();

                if (!authRes.ok) {
                    throw new Error(authData.error_description || authData.msg || 'Error en registro');
                }

                const userId = authData.user?.id;

                // 2. Guardar perfil en tabla "profiles"
                await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        id: userId,
                        first_name: firstName,
                        last_name: lastName,
                        phone,
                        level,
                        created_at: new Date().toISOString()
                    })
                });

                showToast('✓ ¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
                document.getElementById('registerForm').style.opacity = '0.3';
                document.getElementById('registerForm').style.pointerEvents = 'none';

            } catch (err) {
                showToast('✗ ' + err.message, 'error');
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>

</html>
