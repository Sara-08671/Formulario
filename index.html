<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{ box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: 100%;
      max-width: 340px;
      padding: 20px;
    }

    .logo {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #c8ff00;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 20px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 28px;
    }

    input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 0;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      margin-bottom: 22px;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #c8ff00; }
    input::placeholder { color: #3a3a3a; }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: #c8ff00;
      color: #0c0c0c;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #msg {
      font-size: 12px;
      font-weight: 300;
      text-align: center;
      margin-top: 16px;
      min-height: 16px;
    }
    .ok  { color: #c8ff00; }
    .err { color: #ff5a5a; }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      font-weight: 300;
      color: #3a3a3a;
    }
    .footer a { color: #888; text-decoration: none; }
    .footer a:hover { color: #c8ff00; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Formulario de Registro</div>
    <h2>Ingrese los datos</h2>

    <input type="text"     id="nombre"   placeholder="Nombre"/>
    <input type="text"     id="apellido" placeholder="Apellido"/>
    <input type="email"    id="email"    placeholder="Correo electrónico"/>
    <input type="password" id="password" placeholder="Contraseña"/>

    <button id="btn" onclick="registrar()">Registrarse</button>
    <div id="msg"></div>

  </div>

  <script>
    const SUPABASE_URL = 'https://bymcfyydtncomfbpqych.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GSPktrwwvteDkq0wp-dolQ_RXzpf74p';

    async function registrar() {
      const nombre   = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');
      const btn      = document.getElementById('btn');

      if (!nombre || !email || !password) {
        msg.className = 'err';
        msg.textContent = 'Completa todos los campos.';
        return;
      }
      if (password.length < 8) {
        msg.className = 'err';
        msg.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Un momento...';
      msg.textContent = '';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error_description || 'Error al registrar');

        await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ id: data.user?.id, first_name: nombre, last_name: apellido })
        });

        msg.className = 'ok';
        msg.textContent = '✓ Registro exitoso.';
        btn.textContent = '¡Listo!';
      } catch (e) {
        msg.className = 'err';
        msg.textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Registrarse';
      }
    }
  </script>
</body>
</html>
